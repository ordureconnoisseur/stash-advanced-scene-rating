name: Advanced Scene Rating
description: Rate scenes based on advanced criteria using tags.
version: 1.0.4
url: https://github.com/ordureconnoisseur/stash-advanced-scene-rating
exec:
  - python
  - "{pluginDir}/stashAppAdvancedRating.py"
interface: raw
ui:
  javascript:
    - custom-rating-ui.js
  css:
    - custom-rating-ui.css
hooks:
  - name: Process Scene
    triggeredBy:
      - Scene.Update.Post
settings:
  categories:
    displayName: Categories
    description: Comma-separated list of rating categories (e.g. Production Quality,Chemistry,Performance,Aesthetics,Creativity).
    type: STRING
  minimum_required_tags:
    displayName: Minimum Required Tags
    description: Minimum number of category tags needed before a rating is calculated.
    type: NUMBER
  allow_destructive_actions:
    displayName: Allow Destructive Actions
    description: Enables the Remove Tags task. Use with caution.
    type: BOOLEAN
tasks:
  - name: Process All Scenes
    defaultArgs:
      mode: process_scenes
  - name: Create Tags
    defaultArgs:
      mode: create_tags
  - name: Remove Tags
    defaultArgs:
      mode: remove_tags
